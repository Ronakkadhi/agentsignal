name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Verify all sources registered
        run: |
          # Count source files (excluding index.ts)
          SOURCE_FILES=$(find src/sources -name '*.ts' ! -name 'index.ts' | wc -l | tr -d ' ')
          # Count imports in index.ts
          IMPORTS=$(grep -c 'from "./' src/sources/index.ts)
          echo "Source files: $SOURCE_FILES, Registered: $IMPORTS"
          if [ "$SOURCE_FILES" != "$IMPORTS" ]; then
            echo "::error::Not all sources are registered in src/sources/index.ts"
            echo "Found $SOURCE_FILES source files but only $IMPORTS imports"
            exit 1
          fi

      - name: Verify server starts
        run: |
          timeout 15 npx tsx src/index.ts &
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Server health check failed with status $STATUS"
            exit 1
          fi
          echo "Server health check passed"
          kill %1 2>/dev/null || true
